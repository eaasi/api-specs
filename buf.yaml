# buf configuration (https://buf.build/docs/configuration/v2/buf-yaml)

version: v2
modules:
  - path: protobuf
    includes:
      - protobuf/eaasi/v1
    lint:
      ignore_only:
        FILE_LOWER_SNAKE_CASE:
          - protobuf/eaasi/v1/__openapi.proto
        PACKAGE_VERSION_SUFFIX:
          - protobuf/eaasi/v1/types
lint:
  use:
    - STANDARD
breaking:
  use:
    - FILE
